{% extends "base.html" %}
{% block title %}Live Map — NaviX{% endblock %}
{% block content %}
<div style="height:calc(100vh - 65px);display:flex;flex-direction:column">
  <div id="map" style="flex:1"></div>
</div>
{% endblock %}
{% block scripts %}
<script>
const map = L.map('map',{center:[12.97,77.59],zoom:12,zoomControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

const COORDS = {
  'Indiranagar':[12.9784,77.6408],'Whitefield':[12.9698,77.7499],'Koramangala':[12.9352,77.6245],
  'HSR Layout':[12.9116,77.6389],'BTM Layout':[12.9165,77.6101],'Jayanagar':[12.9300,77.5833],
  'JP Nagar':[12.9063,77.5857],'Banashankari':[12.9255,77.5468],'Rajajinagar':[12.9905,77.5530],
  'Malleshwaram':[13.0035,77.5710],'Hebbal':[13.0353,77.5970],'Yeshwanthpur':[13.0207,77.5494],
  'Marathahalli':[12.9591,77.6974],'Bellandur':[12.9261,77.6740],'Sarjapur':[12.8617,77.7846],
  'Electronic City':[12.8452,77.6602],'Bommanahalli':[12.8981,77.6258],'Begur':[12.8716,77.6281],
  'Yelahanka':[13.1004,77.5963],'Hennur':[13.0434,77.6399],'Frazer Town':[12.9875,77.6178],
  'MG Road':[12.9756,77.6197],'Brigade Road':[12.9719,77.6089],'Cubbon Park':[12.9763,77.5929],
  'Vidhana Soudha':[12.9794,77.5913],'Cunningham Road':[12.9894,77.5974],'Domlur':[12.9609,77.6387],
  'CV Raman Nagar':[12.9848,77.6601],'Old Airport Rd':[12.9609,77.6540],'ITPL':[12.9856,77.7272],
  'KR Puram':[13.0070,77.6936],'Mahadevapura':[12.9978,77.7017],'Brookefield':[12.9706,77.7082],
  'Kadugodi':[12.9927,77.7614],'Hoodi':[12.9891,77.7162],'Ramamurthy Nagar':[13.0190,77.6616],
  'TC Palya':[13.0000,77.6800]
};
const SEG_COLORS = {green:'#22c55e',yellow:'#f5a623',orange:'#f97316',red:'#ef4444'};
let lines = [];

async function refreshMap() {
  const segs = await fetch('/api/segments').then(r=>r.json());
  lines.forEach(l=>map.removeLayer(l)); lines=[];
  segs.forEach(s=>{
    const a=COORDS[s.from],b=COORDS[s.to];
    if(!a||!b) return;
    const line=L.polyline([a,b],{color:SEG_COLORS[s.color]||'#8b949e',weight:4,opacity:.85}).addTo(map);
    line.bindPopup(`<b>${s.from} → ${s.to}</b><br>Score: ${s.score} (${s.label})<br>${s.length_km}km · ${s.lanes} lanes`);
    lines.push(line);
  });
  Object.entries(COORDS).forEach(([name,pos])=>{
    const m=L.circleMarker(pos,{radius:5,color:'#f5a623',fillColor:'#f5a623',fillOpacity:.9,weight:1}).addTo(map);
    m.bindTooltip(name,{permanent:false,direction:'top'});
    lines.push(m);
  });
}
refreshMap();setInterval(refreshMap,10000);
</script>
{% endblock %}
