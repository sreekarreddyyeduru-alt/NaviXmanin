{% extends "base.html" %}
{% block title %}Routes — NaviX{% endblock %}
{% block content %}
<div style="display:flex;height:calc(100vh - 65px)">

  <!-- LEFT PANEL -->
  <div style="width:400px;min-width:340px;background:#0d1117;border-right:1px solid #21262d;display:flex;flex-direction:column;overflow-y:auto;z-index:10">

    <!-- Search box -->
    <div style="padding:20px;border-bottom:1px solid #21262d">
      <div style="margin-bottom:12px">
        <label style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px">From</label>
        <div style="position:relative">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px">🟢</span>
          <select id="origin" style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px 12px 10px 36px;font-size:14px;color:#e6edf3;outline:none;cursor:pointer" onchange="onSelectionChange()">
            <option value="">Select origin…</option>
            {% for z in ['Indiranagar','Whitefield','Koramangala','HSR Layout','BTM Layout','Jayanagar','JP Nagar','Banashankari','Rajajinagar','Malleshwaram','Hebbal','Yeshwanthpur','Marathahalli','Bellandur','Sarjapur','Electronic City','Bommanahalli','Begur','Yelahanka','Hennur','Frazer Town','MG Road','Brigade Road','Cubbon Park','Vidhana Soudha','Cunningham Road','Domlur','CV Raman Nagar','Old Airport Rd','ITPL','KR Puram','Mahadevapura','Brookefield','Kadugodi','Hoodi','Ramamurthy Nagar','TC Palya'] %}
            <option>{{ z }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <!-- Swap button -->
      <div style="text-align:center;margin:-4px 0">
        <button onclick="swapZones()" style="background:#21262d;border:1px solid #30363d;border-radius:50%;width:32px;height:32px;color:#8b949e;cursor:pointer;font-size:16px;display:inline-flex;align-items:center;justify-content:center" title="Swap">⇅</button>
      </div>

      <div style="margin-top:8px">
        <label style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px">To</label>
        <div style="position:relative">
          <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px">🔴</span>
          <select id="destination" style="width:100%;background:#161b22;border:1px solid #30363d;border-radius:10px;padding:10px 12px 10px 36px;font-size:14px;color:#e6edf3;outline:none;cursor:pointer" onchange="onSelectionChange()">
            <option value="">Select destination…</option>
            {% for z in ['Indiranagar','Whitefield','Koramangala','HSR Layout','BTM Layout','Jayanagar','JP Nagar','Banashankari','Rajajinagar','Malleshwaram','Hebbal','Yeshwanthpur','Marathahalli','Bellandur','Sarjapur','Electronic City','Bommanahalli','Begur','Yelahanka','Hennur','Frazer Town','MG Road','Brigade Road','Cubbon Park','Vidhana Soudha','Cunningham Road','Domlur','CV Raman Nagar','Old Airport Rd','ITPL','KR Puram','Mahadevapura','Brookefield','Kadugodi','Hoodi','Ramamurthy Nagar','TC Palya'] %}
            <option>{{ z }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <button onclick="calcRoute()" id="btn-find" style="width:100%;margin-top:14px;background:#f5a623;color:#0d1117;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s" onmouseover="this.style.background='#fbbf24'" onmouseout="this.style.background='#f5a623'">
        🔍 Find Route
      </button>
    </div>

    <!-- Route results -->
    <div id="results" style="padding:16px;flex:1">
      <div style="color:#6e7681;font-size:13px;text-align:center;padding:40px 0">Select origin and destination to find routes</div>
    </div>

  </div>

  <!-- MAP -->
  <div style="flex:1;position:relative">
    <div id="map" style="width:100%;height:100%"></div>
    <!-- Map legend -->
    <div style="position:absolute;bottom:20px;left:20px;background:rgba(22,27,34,.9);border:1px solid #30363d;border-radius:10px;padding:12px 16px;font-size:12px;backdrop-filter:blur(8px)">
      <div style="font-weight:700;margin-bottom:8px;color:#e6edf3">Route Legend</div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:4px;background:#f5a623;border-radius:2px"></div><span style="color:#8b949e">Fastest Route</span></div>
        <div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:4px;background:#60a5fa;border-radius:2px"></div><span style="color:#8b949e">Alternative 1</span></div>
        <div style="display:flex;align-items:center;gap:8px"><div style="width:24px;height:4px;background:#a78bfa;border-radius:2px"></div><span style="color:#8b949e">Alternative 2</span></div>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
const COORDS = {
  'Indiranagar':[12.9784,77.6408],'Whitefield':[12.9698,77.7499],'Koramangala':[12.9352,77.6245],
  'HSR Layout':[12.9116,77.6389],'BTM Layout':[12.9165,77.6101],'Jayanagar':[12.9300,77.5833],
  'JP Nagar':[12.9063,77.5857],'Banashankari':[12.9255,77.5468],'Rajajinagar':[12.9905,77.5530],
  'Malleshwaram':[13.0035,77.5710],'Hebbal':[13.0353,77.5970],'Yeshwanthpur':[13.0207,77.5494],
  'Marathahalli':[12.9591,77.6974],'Bellandur':[12.9261,77.6740],'Sarjapur':[12.8617,77.7846],
  'Electronic City':[12.8452,77.6602],'Bommanahalli':[12.8981,77.6258],'Begur':[12.8716,77.6281],
  'Yelahanka':[13.1004,77.5963],'Hennur':[13.0434,77.6399],'Frazer Town':[12.9875,77.6178],
  'MG Road':[12.9756,77.6197],'Brigade Road':[12.9719,77.6089],'Cubbon Park':[12.9763,77.5929],
  'Vidhana Soudha':[12.9794,77.5913],'Cunningham Road':[12.9894,77.5974],'Domlur':[12.9609,77.6387],
  'CV Raman Nagar':[12.9848,77.6601],'Old Airport Rd':[12.9609,77.6540],'ITPL':[12.9856,77.7272],
  'KR Puram':[13.0070,77.6936],'Mahadevapura':[12.9978,77.7017],'Brookefield':[12.9706,77.7082],
  'Kadugodi':[12.9927,77.7614],'Hoodi':[12.9891,77.7162],'Ramamurthy Nagar':[13.0190,77.6616],
  'TC Palya':[13.0000,77.6800]
};

// Init map
const map = L.map('map', {center:[12.97,77.60],zoom:12,zoomControl:false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:18,attribution:''}).addTo(map);
L.control.zoom({position:'topright'}).addTo(map);

let routeLayers = [];
let selectedRouteIdx = 0;

const ROUTE_COLORS = ['#f5a623','#60a5fa','#a78bfa'];
const ROUTE_COLORS_DIM = ['rgba(245,166,35,.35)','rgba(96,165,250,.35)','rgba(167,139,250,.35)'];

function clearLayers() {
  routeLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];
}

function drawRoutes(routes) {
  clearLayers();
  // Draw alts first (behind), then main on top
  [...routes].reverse().forEach((r, revIdx) => {
    const idx = routes.length - 1 - revIdx;
    const pts = r.path.map(z => COORDS[z]).filter(Boolean);
    if (pts.length < 2) return;
    const isSelected = idx === selectedRouteIdx;
    const line = L.polyline(pts, {
      color: ROUTE_COLORS[idx] || '#8b949e',
      weight: isSelected ? 6 : 4,
      opacity: isSelected ? 1 : 0.45,
      dashArray: isSelected ? null : '8,6',
      lineJoin: 'round'
    }).addTo(map);
    line.on('click', () => selectRoute(idx, routes));
    routeLayers.push(line);
  });

  // Origin marker
  const orig = COORDS[routes[0].path[0]];
  if (orig) {
    const m = L.circleMarker(orig, {radius:9,color:'#fff',fillColor:'#22c55e',fillOpacity:1,weight:2}).addTo(map);
    m.bindTooltip(routes[0].path[0], {permanent:false,direction:'top'});
    routeLayers.push(m);
  }
  // Destination marker
  const dest = COORDS[routes[0].path[routes[0].path.length-1]];
  if (dest) {
    const m = L.circleMarker(dest, {radius:9,color:'#fff',fillColor:'#ef4444',fillOpacity:1,weight:2}).addTo(map);
    m.bindTooltip(routes[0].path[routes[0].path.length-1], {permanent:false,direction:'top'});
    routeLayers.push(m);
  }

  // Fit bounds
  const allPts = routes.flatMap(r => r.path.map(z=>COORDS[z]).filter(Boolean));
  if (allPts.length) map.fitBounds(L.latLngBounds(allPts), {padding:[40,40]});
}

function selectRoute(idx, routes) {
  selectedRouteIdx = idx;
  drawRoutes(routes);
  renderCards(routes, idx);
}

function congestionBadge(score) {
  if (score < 40) return {text:'🟢 Clear', color:'#22c55e', bg:'rgba(34,197,94,.1)', border:'rgba(34,197,94,.3)'};
  if (score < 70) return {text:'🟡 Moderate', color:'#f5a623', bg:'rgba(245,166,35,.1)', border:'rgba(245,166,35,.3)'};
  return {text:'🔴 Heavy', color:'#ef4444', bg:'rgba(239,68,68,.1)', border:'rgba(239,68,68,.3)'};
}

function renderCards(routes, activeIdx) {
  const labels = ['Fastest Route', 'Alternative 1', 'Alternative 2'];
  document.getElementById('results').innerHTML = routes.map((r, i) => {
    const badge = congestionBadge(r.avg_congestion);
    const isActive = i === activeIdx;
    const steps = r.path.map((z,si) => {
      if (si === 0) return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0"><span style="font-size:16px">🟢</span><span style="font-size:13px;font-weight:600">${z}</span><span style="font-size:11px;color:#6e7681;margin-left:4px">Start</span></div>`;
      if (si === r.path.length-1) return `<div style="display:flex;align-items:center;gap:8px;padding:6px 0"><span style="font-size:16px">🔴</span><span style="font-size:13px;font-weight:600">${z}</span><span style="font-size:11px;color:#6e7681;margin-left:4px">Destination</span></div>`;
      return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;padding-left:4px"><div style="width:2px;height:20px;background:#30363d;margin-left:7px;margin-right:13px"></div><span style="font-size:12px;color:#8b949e">${z}</span></div>`;
    }).join('');
    return `
    <div onclick="selectRoute(${i}, window._routes)"
         style="background:${isActive ? '#161b22' : '#0d1117'};border:${isActive ? '2px solid '+ROUTE_COLORS[i] : '1px solid #21262d'};border-radius:14px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .2s"
         onmouseover="this.style.borderColor='${ROUTE_COLORS[i]}'" onmouseout="if(${i}!==window._selectedIdx)this.style.borderColor='${isActive?ROUTE_COLORS[i]:'#21262d'}'">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="width:12px;height:12px;border-radius:50%;background:${ROUTE_COLORS[i]}"></div>
          <span style="font-weight:700;font-size:14px">${labels[i]||'Route '+(i+1)}</span>
          ${isActive ? '<span style="font-size:10px;background:#f5a623;color:#0d1117;padding:2px 8px;border-radius:99px;font-weight:700">SELECTED</span>' : ''}
        </div>
        <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:${badge.bg};color:${badge.color};border:1px solid ${badge.border}">${badge.text}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
        <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Distance</div>
          <div style="font-size:16px;font-weight:700;color:#f5a623">${r.total_length_km} km</div>
        </div>
        <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">ETA</div>
          <div style="font-size:16px;font-weight:700;color:#22c55e">${r.eta_minutes} min</div>
        </div>
        <div style="background:#0d1117;border-radius:8px;padding:10px;text-align:center">
          <div style="font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">Fuel</div>
          <div style="font-size:16px;font-weight:700;color:#60a5fa">₹${r.fuel_estimate_inr}</div>
        </div>
      </div>
      ${isActive ? `
      <div style="border-top:1px solid #21262d;padding-top:12px;margin-top:4px">
        <div style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px">Turn-by-turn</div>
        ${steps}
      </div>` : `<div style="font-size:12px;color:#6e7681">📍 ${r.path.join(' → ')}</div>`}
    </div>`;
  }).join('');
  window._selectedIdx = activeIdx;
}

function onSelectionChange() {
  const o = document.getElementById('origin').value;
  const d = document.getElementById('destination').value;
  if (o && d) calcRoute();
}

async function calcRoute() {
  const o = document.getElementById('origin').value;
  const d = document.getElementById('destination').value;
  if (!o || !d) { showToast('Please select both origin and destination', 'error'); return; }
  const btn = document.getElementById('btn-find');
  btn.textContent = '⏳ Calculating…'; btn.disabled = true;
  document.getElementById('results').innerHTML = '<div style="color:#6e7681;font-size:13px;text-align:center;padding:40px 0">Finding best routes…</div>';
  try {
    const res = await fetch('/api/route/calculate', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({origin:o, destination:d})
    }).then(r=>r.json());
    if (!res.ok) {
      document.getElementById('results').innerHTML = `<div style="color:#ef4444;padding:20px;text-align:center">${res.error}</div>`;
      return;
    }
    const routes = [res, ...(res.alternatives||[])];
    window._routes = routes;
    window._selectedIdx = 0;
    selectedRouteIdx = 0;
    drawRoutes(routes);
    renderCards(routes, 0);
  } catch(e) {
    document.getElementById('results').innerHTML = '<div style="color:#ef4444;padding:20px;text-align:center">Failed to calculate route. Please try again.</div>';
  } finally {
    btn.textContent = '🔍 Find Route'; btn.disabled = false;
  }
}

function swapZones() {
  const o = document.getElementById('origin');
  const d = document.getElementById('destination');
  const tmp = o.value; o.value = d.value; d.value = tmp;
  if (o.value && d.value) calcRoute();
}
</script>
{% endblock %}
